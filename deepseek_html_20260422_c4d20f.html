<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能单词本 Pro | 雅思7000+词库</title>
    <style>

            margin: 0;
            padding: 0;

        /* 浅色波浪动态背景 */

            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(102,126,234,0.1)" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: 1440px 200px;

            opacity: 0.6;

        .wave:nth-child(2) {

            background-size: 1440px 200px;
        }

        @keyframes waveMove {
            0% { background-position-x: 0; }
            100% { background-position-x: 1440px; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;

        /* 头部 */

<body>
    <div class="wave-bg">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>
    <div class="container" id="app"></div>

    <div class="container"> <!-- New container for the button -->
                     <div class="import-section" style="margin-top: 20px;"> <!-- Reusing existing styles -->
                         <button id="importDictionaryBtn" class="btn btn-primary" style="width: 100%;">导入外部词典</button>
                     </div>
                 </div>
             
                  <script>
                      // ==================== 词库数据 ====================
                      document.addEventListener('DOMContentLoaded', () => {
                          const importButton = document.getElementById('importDictionaryBtn');
                          if (importButton) {
                              importButton.addEventListener('click', async () => {
                                  if (confirm('确定要导入外部词典吗？这将会合并新的词汇。')) {
                                      try {
                                          const response = await fetch('./data/vocabulary.json');
                                          if (!response.ok) {
                                              throw new Error(`HTTP error! status: ${response.status}`);
                                          }
                                          const newVocabulary = await response.json();
                                          
                                          if (newVocabulary && Array.isArray(newVocabulary)) {
                                              const existingWordsSet = new Set(app.allWords.map(w => w.word));
                                              const wordsToImport = newVocabulary.filter(wordObj => !existingWordsSet.has(wordObj.word));
                                              
                                              if (wordsToImport.length > 0) {
                                                  // Assuming word objects have a 'word' property and potentially others
                                                  app.allWords = [...wordsToImport, ...app.allWords];
                                                  app.learningQueue = [...wordsToImport.map(w => w.word), ...app.learningQueue]; // Add new words to learning queue
                                                  app.saveToStorage();
                                                  app.renderHome(); // Re-render the home page to reflect new word counts
                                                  alert(`成功导入 ${wordsToImport.length} 个新单词！`);
                                              } else {
                                                  alert('没有新的单词可导入。');
                                              }
                                          } else {
                                              alert('导入失败：词典文件格式不正确。');
                                          }
                                      } catch (error) {
                                          console.error('导入词典失败:', error);
                                          alert('导入词典失败，请检查文件或网络。');
                                      }
                                  }
                              });
                          }
                      });
                      
                      // Check if app.renderHome exists before calling it
                      // If not, a more targeted re-render might be needed depending on the app's structure
        const FALLBACK_WORDS = [
            { word: "abandon", meaningCn: "抛弃，放弃", example: "He had to abandon his car.", exampleCn: "他不得不放弃他的车。", group: "Unit 1" },
            { word: "ability", meaningCn: "能力，才能", example: "She has the ability to learn quickly.", exampleCn: "她有快速学习的能力。", group: "Unit 1" },

// ==================== 1. 从GitHub获取词库列表 ====================
async function fetchWordListFromGitHub() {
    // 可用的开源词库URL
    const wordListUrls = {
        ielts: 'https://raw.githubusercontent.com/kajweb/dict/main/data/ielts.json',
        cet4: 'https://raw.githubusercontent.com/kajweb/dict/main/data/cet4.json',
        cet6: 'https://raw.githubusercontent.com/kajweb/dict/main/data/cet6.json',
        kaoyan: 'https://raw.githubusercontent.com/kajweb/dict/main/data/kaoyan.json',
        gre: 'https://raw.githubusercontent.com/kajweb/dict/main/data/gre.json'
    };
    
    try {
        const response = await fetch(wordListUrls.ielts); // 暂时只使用雅思词库
        const data = await response.json();
        
        // 返回格式可能是数组或对象，需要解析
        if (Array.isArray(data)) {
            return data;  // 直接返回单词数组
        } else if (data.data && Array.isArray(data.data)) {
            return data.data;
        } else if (typeof data === 'object') {
            return Object.keys(data);  // 返回所有键名作为单词
        }
        return [];
    } catch (error) {
        console.error('获取词库失败:', error);
        return [];
    }
}

// ==================== 2. 批量获取单词的中文释义（使用翻译API）====================
async function fetchChineseMeaning(word) {
    console.log(`[fetchChineseMeaning] Attempting to fetch meaning for word: ${word}`); // DEBUG
    try {
        // 使用Free Dictionary API获取英文释义 + MyMemory翻译成中文
        const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        console.log(`[fetchChineseMeaning] Dictionary API response for ${word}: ${dictRes.status} ${dictRes.statusText}, ok: ${dictRes.ok}`); // DEBUG
        if (!dictRes.ok) throw new Error('API失败');
        const dictData = await dictRes.json();
        const englishDef = dictData[0]?.meanings[0]?.definitions[0]?.definition || '';
        console.log(`[fetchChineseMeaning] English definition for ${word}: ${englishDef}`); // DEBUG
        
        // 翻译成中文（使用MyMemory API）
        const transRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(englishDef)}&langpair=en|zh`);
        console.log(`[fetchChineseMeaning] Translation API response for ${word}: ${transRes.status} ${transRes.statusText}, ok: ${transRes.ok}`); // DEBUG
        const transData = await transRes.json();
        const chineseMeaning = transData?.responseData?.translatedText || englishDef;
        console.log(`[fetchChineseMeaning] Chinese meaning for ${word}: ${chineseMeaning}`); // DEBUG
        
        return {
            word: word,
            meaningCn: chineseMeaning.slice(0, 50),
            example: dictData[0]?.meanings[0]?.definitions[0]?.example || `Example with \"${word}\" `,
            exampleCn: `\"${word}\"的例句`,
            phonetic: dictData[0]?.phonetic || ''
        };
    } catch (error) {
        console.error(`[fetchChineseMeaning] Error fetching meaning for ${word}:`, error); // DEBUG
        // 降级：返回基础对象
        return {
            word: word,
            meaningCn: '待完善释义',
            example: `Example with \"${word}\" `,
            exampleCn: `\"${word}\"的例句`,
            phonetic: ''
        };
    }
}

// ==================== 3. 分批导入（核心：不卡死页面）====================
async function batchImportWords(wordList, onProgress) {
    // wordList: 单词数组，如 ["apple", "book", "cat"...]
    // onProgress: 进度回调函数 (current, total, currentWord)
    
    const BATCH_SIZE = 20;  // 每批处理20个，避免卡顿
    const results = [];
    console.log(`[batchImportWords] Starting batch import for ${wordList.length} words.`); // DEBUG
    
    for (let i = 0; i < wordList.length; i += BATCH_SIZE) {
        const batch = wordList.slice(i, i + BATCH_SIZE);
        console.log(`[batchImportWords] Processing batch ${Math.floor(i / BATCH_SIZE) + 1}/${Math.ceil(wordList.length / BATCH_SIZE)} with ${batch.length} words.`); // DEBUG
        
        // 并发处理这一批（但限制并发数）
        const batchResults = await Promise.all(
            batch.map(async (word, idx) => {
                console.log(`[batchImportWords] Calling fetchChineseMeaning for word: ${word}`); // DEBUG
                const result = await fetchChineseMeaning(word);
                console.log(`[batchImportWords] Received result for ${word}:`, result); // DEBUG
                if (onProgress) {
                    onProgress(i + idx + 1, wordList.length, word);
                }
                return result;
            })
        );
        
        results.push(...batchResults);
        
        // 每批之间休息50ms，让UI更新
        await new Promise(resolve => setTimeout(resolve, 50));
    }
    console.log(`[batchImportWords] Completed batch import. Total results: ${results.length}`); // DEBUG
    return results;
}

// ==================== 4. 带进度显示的完整导入函数 ====================
async function importLargeDictionary() {
    // 步骤1：获取词库列表
    showProgress('正在获取词库列表...', 0);
    const wordList = await fetchWordListFromGitHub();
    
    if (wordList.length === 0) {
        alert('获取词库失败，请检查网络');
        return;
    }
    
    // 步骤2：过滤已存在的单词
    const existingWords = new Set(app.allWords.map(w => w.word));
    const newWords = wordList.filter(w => !existingWords.has(w)).slice(0, 1000); // 限制1000个
    
    // 步骤3：批量导入
    showProgress('正在导入单词...', 0);
    
    const importedWords = await batchImportWords(newWords, (current, total, word) => {
        const percent = (current / total * 100).toFixed(1);
        showProgress(`正在导入: ${word} (${current}/${total})`, percent);
    });
    
    // 步骤4：保存到本地
    app.allWords = [...importedWords, ...app.allWords];
    app.learningQueue = [...importedWords.map(w => w.word), ...app.learningQueue];
    app.saveToStorage();
    
    alert(`✅ 导入完成！成功添加 ${importedWords.length} 个新单词`);
    hideProgress();
}

                const currentWord = this.testWords[this.testIndex];
                const correctMeaning = currentWord.meaningCn;

                options.add(correctMeaning);

                // Get 3 random incorrect meanings
                while (options.size < 4) {
                    const randomWord = this.allWords[Math.floor(Math.random() * this.allWords.length)];
                    if (randomWord.meaningCn && randomWord.meaningCn !== correctMeaning) {

                    </div>

                    <!-- 单词分组选择 -->
                    ${this.currentList === 'review' ? `
                    <div class="group-select-container">
                        <select class="group-select" onchange="app.switchGroup(this.value)">
                            ${this.getUniqueGroups().map(group => `
                                <option value="${group}" ${this.currentGroup === group ? 'selected' : ''}>${group === 'all' ? '所有分组' : group}</option>
                            `).join('')}
                        </select>
                    </div>
                    ` : ''}

                    <div class="progress-section">
                        <div class="progress-header">
                            <span>📊 学习进度</span>
                            <span>${reviewCount} / ${allCount} 已掌握 (${Math.round(progress)}%)</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    <div class="plan-section">
                        <div class="plan-title">📅 每日学习计划</div>
                        <div class="plan-controls">
                            <div class="plan-item">
                                <label>📖 新学单词</label>
                                <input type="number" id="dailyNew" value="${this.dailyNew}" min="1" max="100" onchange="app.updatePlan()">
                                <label>个/天</label>
                            </div>
                            <div class="plan-item">
                                <label>🔄 复习单词</label>
                                <input type="number" id="dailyReview" value="${this.dailyReview}" min="1" max="200" onchange="app.updatePlan()">
                                <label>个/天</label>
                            </div>
                        </div>
                        <div class="days-info">
                            ⏰ 按当前计划，约 <span>${remainingDays}</span> 天完成全部单词
                        </div>
                        <button class="start-learning-btn" onclick="app.startCardLearning()">
                            🚀 开始学习
                        </button>
                    </div>
                    
                    <div class="import-section">
                        <div style="font-weight: 600; margin-bottom: 12px;">📥 导入预设词库</div>
                        <div class="import-buttons">
                            <button class="btn btn-ielts" onclick="app.importPredefinedDictionary('ielts')">📖 雅思词库</button>
                            <button class="btn btn-primary" onclick="app.importPredefinedDictionary('cet4')">📚 四级词库</button>
                            <button class="btn btn-primary" onclick="app.importPredefinedDictionary('cet6')">📚 六级词库</button>
                            <button class="btn btn-primary" onclick="app.importPredefinedDictionary('kaoyan')">📚 考研词库</button>
                            <button class="btn btn-primary" onclick="app.importPredefinedDictionary('gre')">� GRE词库</button>
                        </div>
                        <div style="margin-top: 12px; font-size: 0.7rem; color: #999;">
                            ✅ 当前词库: ${allCount} 个单词
                        </div>
                    </div>
                `;
            }
            
            closeModal() {
                this.showModal = false;
                this.render();
            }
            
            confirmModal() {
                if (this.modalCallback) {
                    this.modalCallback();
                }
                this.modalCallback = null;
            }

            // 处理文件上传
            handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) {
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    let newWords = [];

                    try {
                        if (file.name.endsWith('.csv')) {
                            newWords = this.parseCSV(content);
                        } else if (file.name.endsWith('.json')) {
                            newWords = this.parseJSON(content);
                        } else {
                            alert('不支持的文件格式。请上传CSV或JSON文件。');
                            return;
                        }
                    } catch (error) {
                        alert('解析文件失败：' + error.message);
                        console.error('File parsing error:', error);
                        return;
                    }
                    console.log('Parsed new words:', newWords); // 添加调试日志

                    const addedCount = this.addWordsToApp(newWords); // capture addedCount
                    alert(`成功导入 ${addedCount} 个新单词！`); // update alert message
                    this.render();
                };

                reader.onerror = () => {
                    alert('读取文件失败。');
                };

                reader.readAsText(file);
            }

            // 解析CSV文件内容
            parseCSV(csvContent) {
                const lines = csvContent.split(/\r\n|\n/);
                const words = [];
                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (!trimmedLine) continue;
                    const parts = trimmedLine.split(',').map(p => p.trim());
                    if (parts.length >= 2) {
                        words.push({
                            word: parts[0],
                            meaningCn: parts[1],
                            phonetic: parts[2] || '',
                            group: '导入词汇' // 默认分组
                        });
                    }
                }
                return words;
            }

            // 解析JSON文件内容
            parseJSON(jsonContent) {
                const data = JSON.parse(jsonContent);
                if (!Array.isArray(data)) {
                    throw new Error('JSON文件内容应为单词对象数组。');
                }
                return data.map(item => ({
                    word: item.word || '',
                    meaningCn: item.meaningCn || '',
                    phonetic: item.phonetic || '',
                    group: item.group || '导入词汇'
                }));
            }

            // 添加单词到应用中（去重）
            addWordsToApp(newWords) {
                let addedCount = 0;
                for (const newWord of newWords) {
                    console.log('Processing new word:', newWord); // 添加调试日志
                    const existingWordIndex = this.allWords.findIndex(w => w.word.toLowerCase() === newWord.word.toLowerCase());
                    console.log('Existing word index for', newWord.word, ':', existingWordIndex); // 添加调试日志

                    if (existingWordIndex === -1) {
                        // 如果单词不存在，则添加
                        const wordToAdd = {
                            ...newWord,
                            correctCount: 0,
                            incorrectCount: 0,
                            totalAttempts: 0
                        };
                        this.allWords.push(wordToAdd);
                        this.learningQueue.push(newWord.word);
                        addedCount++;
                        console.log('Added new word:', wordToAdd); // 添加调试日志
                    } else {
                        // 如果单词已存在，可以选择更新其信息或跳过
                        const existingWord = this.allWords[existingWordIndex];
                        const updatedWord = {
                            ...existingWord,
                            meaningCn: newWord.meaningCn || existingWord.meaningCn,
                            phonetic: newWord.phonetic || existingWord.phonetic,
                            group: newWord.group || existingWord.group
                        };
                        this.allWords[existingWordIndex] = updatedWord;
                        console.log('Updated existing word:', updatedWord); // 添加调试日志
                    }
                }
                this.saveToStorage();
                return addedCount;
            }
        }
        
        let app;
        window.onload = () => {
            app = new WordMasterApp();
            window.app = app;
        };
    </script>
</body>
</html>
