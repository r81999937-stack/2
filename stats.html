<!-- ====== stats.html 统计页面（可直接运行） ====== --> 
 <!DOCTYPE html> 
 <html lang="zh"> 
 <head> 
 <meta charset="UTF-8"> 
 <title>问卷统计</title> 
 </head> 
 <body> 
 
 <h2>调查结果统计</h2> 
 <pre id="result"></pre> 
 
 <script> 
 function loadData() { 
   const data = JSON.parse(localStorage.getItem('surveyData') || '[]'); 
 
   let total = data.length; 
   let lateCount = 0; 
   let stressCount = 0; 
 
   data.forEach(d => { 
     if (d.late === "是") lateCount++; 
     if (d.stress === "是") stressCount++; 
   }); 
 
   document.getElementById("result").textContent = 
     `总人数: ${total}\n熬夜人数: ${lateCount}\n压力大人数: ${stressCount}`;
 } 
 
 loadData(); 
 </script> 
 
 </body> 
 </html>
