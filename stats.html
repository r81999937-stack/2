<!-- ====== stats.html 统计页面 ====== -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>问卷统计</title>
</head>
<body>

<h2>调查结果统计</h2>
<pre id="result"></pre>

<script>
const API_URL = " `https://api.jsonbin.io/v3/b/YOUR_BIN_ID` ";
const API_KEY = "YOUR_API_KEY";

async function loadData() {
  const res = await fetch(API_URL, {
    headers: { "X-Master-Key": API_KEY }
  });
  const json = await res.json();
  const data = json.record || [];

  let total = data.length;
  let lateCount = 0;
  let stressCount = 0;

  data.forEach(d => {
    if (d.late === "是") lateCount++;
    if (d.stress === "是") stressCount++;
  });

  document.getElementById("result").textContent =
    `总人数: ${total}\n熬夜人数: ${lateCount}\n压力大人数: ${stressCount}`;
}

loadData();
</script>

</body>
</html>
