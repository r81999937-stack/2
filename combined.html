<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combined Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #333;
            padding: 10px 0;
            text-align: center;
        }
        .navbar button {
            background-color: #555;
            color: white;
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .navbar button:hover {
            background-color: #777;
        }
        .content {
            width: 100%;
            height: calc(100vh - 50px); /* Adjust height based on navbar height */
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <button onclick="showContent('focusmate')">FocusMate Pro</button>
        <button onclick="showContent('wordbook')">智能单词本 Pro</button>
    </div>

    <div id="focusmateContent" class="content">
        <iframe src="index.html"></iframe>
    </div>
    <div id="wordbookContent" class="content" style="display:none;">
        <iframe src="deepseek_html_20260422_c4d20f.html"></iframe>
    </div>

    <script>
        function showContent(contentId) {
            document.getElementById('focusmateContent').style.display = 'none';
            document.getElementById('wordbookContent').style.display = 'none';
            document.getElementById(contentId + 'Content').style.display = 'block';
        }
        // Show FocusMate Pro by default
        showContent('focusmate');
    </script>
</body>
</html>
